# TP Seance 18 - Integration continue (CI) avec GitHub Actions
name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Qualite (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (sans cache)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Installation des dependances (projet + dev)
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src

      - name: Types (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest || true

  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (sans cache)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Installation des dependances
        run: uv sync

      - name: Donnees + entrainement de la baseline
        run: uv run python -m src.train
        env:
          MLFLOW_TRACKING_URI: file:./mlruns

      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib